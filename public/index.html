<!DOCTYPE html>
<html>
<head>
    <title>Arclights Limited Attendance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-content {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .current-time {
            font-size: 16px;
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .avatar {
            width: 80px;
            height: 80px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }

        .in { background: #16a34a; }
        .out { background: #dc2626; }

        button:hover { opacity: 0.9; }

        #message {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 20px;
            padding: 15px;
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            border-radius: 6px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        thead {
            background: #1e3a8a;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <div class="header-content">Arclights Limited Attendance System</div>
    <div class="current-time" id="liveTime"></div>
</header>

<div id="message"></div>

<div class="container">

    <div class="card">
        <div class="avatar">G</div>
        <h2>Geoffrey Onyango</h2>
        <input type="password" id="pin-Geoffrey-Onyango" placeholder="Enter PIN">

        <button class="in" onclick="clockIn('Geoffrey Onyango')">Clock In</button>
        <button class="out" onclick="clockOut('Geoffrey Onyango')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">J</div>
        <h2>Jackline Mbithi</h2>
        <input type="password" id="pin-Jackline-Mbithi" placeholder="Enter PIN">

        <button class="in" onclick="clockIn('Jackline Mbithi')">Clock In</button>
        <button class="out" onclick="clockOut('Jackline Mbithi')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">S</div>
        <h2>Sherill Cornel</h2>
        <input type="password" id="pin-Sherill-Cornel" placeholder="Enter PIN">

        <button class="in" onclick="clockIn('Sherill Cornel')">Clock In</button>
        <button class="out" onclick="clockOut('Sherill Cornel')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">O</div>
        <h2>Owet Cynthia</h2>
        <input type="password" id="pin-Owet-Cynthia" placeholder="Enter PIN">

        <button class="in" onclick="clockIn('Owet Cynthia')">Clock In</button>
        <button class="out" onclick="clockOut('Owet Cynthia')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">A</div>
        <h2>Anthony Kihara</h2>
        <input type="password" id="pin-Anthony-Kihara" placeholder="Enter PIN">

        <button class="in" onclick="clockIn('Anthony Kihara')">Clock In</button>
        <button class="out" onclick="clockOut('Anthony Kihara')">Clock Out</button>
    </div>

</div>

<div style="padding: 30px;">
    <h2>Attendance History</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Clock In</th>
                <th>Clock Out</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
    </table>
</div>

<script>

const API_BASE = "https://staff-attendance-backend-p39t.onrender.com";

/* =========================
   LIVE CLOCK
========================= */
function updateLiveTime() {
    const now = new Date();
    document.getElementById("liveTime").innerText =
        now.toLocaleString('en-US', {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
}

setInterval(updateLiveTime, 1000);
updateLiveTime();

/* =========================
   GET PIN
========================= */
function getPin(name) {
    const id = "pin-" + name.replace(/ /g, "-");
    return document.getElementById(id).value;
}

/* =========================
   CLOCK IN
========================= */
async function clockIn(name) {
    const pin = getPin(name);

    const response = await fetch(`${API_BASE}/clock-in`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, pin })
    });

    const data = await response.json();
    document.getElementById("message").innerText = data.message;

    loadAttendanceHistory();
}

/* =========================
   CLOCK OUT
========================= */
async function clockOut(name) {
    const pin = getPin(name);

    const response = await fetch(`${API_BASE}/clock-out`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, pin })
    });

    const data = await response.json();
    document.getElementById("message").innerText = data.message;

    loadAttendanceHistory();
}

/* =========================
   LOAD HISTORY
========================= */
async function loadAttendanceHistory() {
    const response = await fetch(`${API_BASE}/attendance-history`);
    const data = await response.json();

    const tableBody = document.getElementById("attendanceTableBody");
    tableBody.innerHTML = "";

    data.forEach(record => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${record.name}</td>
            <td>${record.work_date}</td>
            <td>${record.time_in || "N/A"}</td>
            <td>${record.time_out || "N/A"}</td>
        `;

        tableBody.appendChild(row);
    });
}

/* =========================
   INIT
========================= */
loadAttendanceHistory();
setInterval(loadAttendanceHistory, 5000);

</script>

</body>
</html>
