<!DOCTYPE html>
<html>
<head>
    <title>Arclights Limited Attendance</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-content {
            font-size: 28px;
            font-weight: bold;
        }

        .current-time {
            font-size: 16px;
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: white;
        }

        .in { background: #16a34a; }
        .out { background: #dc2626; }

        #message {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 20px;
            padding: 15px;
            border-radius: 6px;
            background: #fff;
            border-left: 5px solid #1e3a8a;
            min-height: 30px;
        }

        .success { color: #16a34a; }
        .error { color: #dc2626; }

    </style>
</head>

<body>

<header>
    <div class="header-content">Arclights Limited Attendance System</div>
    <div class="current-time" id="liveTime"></div>
</header>

<div id="message"></div>

<div class="container">

    <!-- Employees -->
    <div class="card">
        <div class="avatar">G</div>
        <h2>Geoffrey Onyango</h2>
        <input type="password" id="pin-Geoffrey-Onyango" placeholder="Enter PIN">
        <button class="in" onclick="clockIn('Geoffrey Onyango')">Clock In</button>
        <button class="out" onclick="clockOut('Geoffrey Onyango')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">J</div>
        <h2>Jackline Mbithi</h2>
        <input type="password" id="pin-Jackline-Mbithi">
        <button class="in" onclick="clockIn('Jackline Mbithi')">Clock In</button>
        <button class="out" onclick="clockOut('Jackline Mbithi')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">S</div>
        <h2>Sherill Cornel</h2>
        <input type="password" id="pin-Sherill-Cornel">
        <button class="in" onclick="clockIn('Sherill Cornel')">Clock In</button>
        <button class="out" onclick="clockOut('Sherill Cornel')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">O</div>
        <h2>Owet Cynthia</h2>
        <input type="password" id="pin-Owet-Cynthia">
        <button class="in" onclick="clockIn('Owet Cynthia')">Clock In</button>
        <button class="out" onclick="clockOut('Owet Cynthia')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">A</div>
        <h2>Anthony Kihara</h2>
        <input type="password" id="pin-Anthony-Kihara">
        <button class="in" onclick="clockIn('Anthony Kihara')">Clock In</button>
        <button class="out" onclick="clockOut('Anthony Kihara')">Clock Out</button>
    </div>

    <div class="card">
        <div class="avatar">W</div>
        <h2>Wambui Kinuthia</h2>
        <input type="password" id="pin-Wambui-Kinuthia">
        <button class="in" onclick="clockIn('Wambui Kinuthia')">Clock In</button>
        <button class="out" onclick="clockOut('Wambui Kinuthia')">Clock Out</button>
    </div>

</div>

<script>

const API_BASE = "https://staff-attendance-backend-p39t.onrender.com";

/* =========================
   LIVE CLOCK
========================= */
setInterval(() => {
    const now = new Date();
    document.getElementById("liveTime").innerText =
        now.toLocaleString("en-KE", {
            timeZone: "Africa/Nairobi",
            hour12: true,
            weekday: "short",
            year: "numeric",
            month: "short",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        });
}, 1000);

/* =========================
   HELPERS
========================= */
function getPin(name) {
    const id = "pin-" + name.replace(/ /g, "-");
    return document.getElementById(id).value.trim();
}

function clearPin(name) {
    const id = "pin-" + name.replace(/ /g, "-");
    document.getElementById(id).value = "";
}

function showMessage(msg, type = "success") {
    const box = document.getElementById("message");
    box.innerText = msg;
    box.className = type;
}

/* =========================
   CLOCK IN
========================= */
async function clockIn(name) {

    const pin = getPin(name);

    if (!pin) {
        showMessage("Enter PIN first", "error");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/clock-in`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, pin })
        });

        const data = await res.json();

        if (!res.ok) {
            showMessage(data.message || "Clock-in failed", "error");
            return;
        }

        showMessage(data.message, "success");
        clearPin(name);

    } catch (err) {
        showMessage("Server error", "error");
    }
}

/* =========================
   CLOCK OUT
========================= */
async function clockOut(name) {

    const pin = getPin(name);

    if (!pin) {
        showMessage("Enter PIN first", "error");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/clock-out`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, pin })
        });

        const data = await res.json();

        if (!res.ok) {
            showMessage(data.message || "Clock-out failed", "error");
            return;
        }

        showMessage(data.message, "success");
        clearPin(name);

    } catch (err) {
        showMessage("Server error", "error");
    }
}

</script>

</body>
</html>
