<!DOCTYPE html>
<html>
<head>
    <title>Arclights Limited Attendance</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-content {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .current-time {
            font-size: 16px;
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }

        .in {
            background: #16a34a;
        }

        .out {
            background: #dc2626;
        }

        button:hover {
            opacity: 0.9;
        }

        #message {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 20px;
            padding: 15px;
            background: white;
            border-left: 5px solid #1e3a8a;
            border-radius: 6px;
            min-height: 30px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }

    </style>

</head>

<body>

<header>

    <div class="header-content">
        Arclights Limited Attendance System
    </div>

    <div class="current-time" id="liveTime"></div>

</header>

<div id="message"></div>

<div class="container">

    <!-- Geoffrey -->
    <div class="card">

        <div class="avatar">G</div>

        <h2>Geoffrey Onyango</h2>

        <input
            type="password"
            id="pin-Geoffrey-Onyango"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Geoffrey Onyango')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Geoffrey Onyango')"
        >
            Clock Out
        </button>

    </div>

    <!-- Jackline -->
    <div class="card">

        <div class="avatar">J</div>

        <h2>Jackline Mbithi</h2>

        <input
            type="password"
            id="pin-Jackline-Mbithi"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Jackline Mbithi')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Jackline Mbithi')"
        >
            Clock Out
        </button>

    </div>

    <!-- Sherill -->
    <div class="card">

        <div class="avatar">S</div>

        <h2>Sherill Cornel</h2>

        <input
            type="password"
            id="pin-Sherill-Cornel"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Sherill Cornel')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Sherill Cornel')"
        >
            Clock Out
        </button>

    </div>

    <!-- Owet -->
    <div class="card">

        <div class="avatar">O</div>

        <h2>Owet Cynthia</h2>

        <input
            type="password"
            id="pin-Owet-Cynthia"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Owet Cynthia')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Owet Cynthia')"
        >
            Clock Out
        </button>

    </div>

    <!-- Anthony -->
    <div class="card">

        <div class="avatar">A</div>

        <h2>Anthony Kihara</h2>

        <input
            type="password"
            id="pin-Anthony-Kihara"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Anthony Kihara')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Anthony Kihara')"
        >
            Clock Out
        </button>

    </div>

    <!-- Wambui -->
    <div class="card">

        <div class="avatar">W</div>

        <h2>Wambui Kinuthia</h2>

        <input
            type="password"
            id="pin-Wambui-Kinuthia"
            placeholder="Enter PIN"
        >

        <button
            class="in"
            onclick="clockIn('Wambui Kinuthia')"
        >
            Clock In
        </button>

        <button
            class="out"
            onclick="clockOut('Wambui Kinuthia')"
        >
            Clock Out
        </button>

    </div>

</div>

<script>

const API_BASE = "https://staff-attendance-backend-p39t.onrender.com";

/* =========================
   LIVE CLOCK
========================= */
function updateLiveTime() {

    const now = new Date();

    document.getElementById("liveTime").innerText =
        now.toLocaleString("en-KE", {
            timeZone: "Africa/Nairobi",
            weekday: "short",
            year: "numeric",
            month: "short",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: true
        });

}

setInterval(updateLiveTime, 1000);

updateLiveTime();

/* =========================
   GET PIN
========================= */
function getPin(name) {

    const id = "pin-" + name.replace(/ /g, "-");

    return document.getElementById(id).value.trim();

}

/* =========================
   CLEAR PIN
========================= */
function clearPin(name) {

    const id = "pin-" + name.replace(/ /g, "-");

    document.getElementById(id).value = "";

}

/* =========================
   SHOW MESSAGE
========================= */
function showMessage(message, type = "success") {

    const messageBox = document.getElementById("message");

    messageBox.innerText = message;

    if (type === "error") {
        messageBox.className = "error";
    } else {
        messageBox.className = "success";
    }

}

/* =========================
   CLOCK IN
========================= */
async function clockIn(name) {

    try {

        const pin = getPin(name);

        if (!pin) {

            showMessage("Please enter your PIN", "error");

            return;

        }

        const response = await fetch(`${API_BASE}/clock-in`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name,
                pin
            })

        });

        const data = await response.json();

        if (!response.ok) {

            showMessage(data.message || "Clock-in failed", "error");

            return;

        }

        showMessage(data.message, "success");

        clearPin(name);

    }

    catch (err) {

        console.error(err);

        showMessage("Server connection failed", "error");

    }

}

/* =========================
   CLOCK OUT
========================= */
async function clockOut(name) {

    try {

        const pin = getPin(name);

        if (!pin) {

            showMessage("Please enter your PIN", "error");

            return;

        }

        const response = await fetch(`${API_BASE}/clock-out`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name,
                pin
            })

        });

        const data = await response.json();

        if (!response.ok) {

            showMessage(data.message || "Clock-out failed", "error");

            return;

        }

        showMessage(data.message, "success");

        clearPin(name);

    }

    catch (err) {

        console.error(err);

        showMessage("Server connection failed", "error");

    }

}

</script>

</body>
</html>
