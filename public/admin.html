<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            color: #1e3a8a;
        }

        button {
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
        }
    </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<button onclick="logout()">Logout</button>

<h2>Attendance History</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Clock In</th>
            <th>Clock Out</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>

const API_BASE = "https://staff-attendance-backend-p39t.onrender.com";

/* =========================
   LOAD ATTENDANCE HISTORY
========================= */
async function loadData() {

    try {

        const res = await fetch(`${API_BASE}/attendance-history`);
        const data = await res.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        data.forEach(row => {

            table.innerHTML += `
                <tr>
                    <td>${row.name}</td>
                    <td>${row.work_date}</td>
                    <td>${row.time_in || "N/A"}</td>
                    <td>${row.time_out || "N/A"}</td>
                </tr>
            `;

        });

    } catch (err) {

        console.error(err);
        alert("Failed to load attendance history");

    }

}

/* =========================
   LOGOUT
========================= */
function logout() {
    window.location.href = "/admin-login.html";
}

/* =========================
   INIT
========================= */
loadData();

</script>

</body>
</html>
