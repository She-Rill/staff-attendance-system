<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            color: #1e3a8a;
        }

        button {
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
        }
    </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<button onclick="logout()">Logout</button>

<h2>Attendance History</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Clock In</th>
            <th>Clock Out</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>
const API_BASE = "https://staff-attendance-backend-p39t.onrender.com";

/* =========================
   GET JWT TOKEN
========================= */
function getToken() {
    return localStorage.getItem("adminToken");
}

/* =========================
   CHECK LOGIN
========================= */
function checkAuth() {
    const token = getToken();

    if (!token) {
        alert("Not logged in");
        window.location.href = "/admin-login.html";
    }
}

/* =========================
   LOAD DATA (PROTECTED)
========================= */
async function loadData() {

    checkAuth();

    try {

        const res = await fetch(`${API_BASE}/admin/history`, {
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        if (res.status === 401) {
            alert("Session expired. Please login again.");
            localStorage.removeItem("adminToken");
            window.location.href = "/admin-login.html";
            return;
        }

        const data = await res.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        data.forEach(row => {
            table.innerHTML += `
                <tr>
                    <td>${row.name}</td>
                    <td>${row.work_date}</td>
                    <td>${row.time_in}</td>
                    <td>${row.time_out || "N/A"}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error("Failed to load admin history:", err);
    }
}

/* =========================
   LOGOUT
========================= */
async function logout() {

    localStorage.removeItem("adminToken");

    await fetch(`${API_BASE}/admin/logout`, {
        method: "POST"
    });

    window.location.href = "/admin-login.html";
}

/* =========================
   INIT
========================= */
loadData();

</script>

</body>
</html>
